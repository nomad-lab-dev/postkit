<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PostKit — Landing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif&family=Geist+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #0a0a0c;
    background: #fff;
  }
  @keyframes chaosIn { from { opacity: 0; transform: scale(.9); } to { opacity: 1; transform: scale(1); } }
  @keyframes slotIn { from { opacity: 0; transform: scale(1.1); filter: blur(8px); } to { opacity: 1; transform: scale(1); filter: blur(0); } }
  @keyframes fadeScale { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  button, input { font-family: inherit; }
  .font-sans { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif; }
  .font-serif { font-family: "Instrument Serif", "Times New Roman", Georgia, serif; }
  .font-grotesk { font-family: "Space Grotesk", system-ui, sans-serif; }

  /* tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; z-index: 9999;
    background: rgba(255,255,255,.92); backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(0,0,0,.1); border-radius: 16px;
    padding: 16px 18px; min-width: 260px;
    box-shadow: 0 20px 40px -10px rgba(0,0,0,.15);
    font-size: 13px;
    display: none;
  }
  .tweaks-panel.open { display: block; }
  .tweaks-panel h4 {
    margin: 0 0 12px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; color: #86868b;
  }
  .tw-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 12px; }
  .tw-row label { font-size: 12px; color: #52525b; }
  .tw-row select, .tw-row button {
    padding: 4px 10px; border: 1px solid rgba(0,0,0,.12); border-radius: 8px;
    background: #fff; font-size: 12px; cursor: pointer;
  }
  .tw-toggle { display: flex; gap: 2px; padding: 2px; background: rgba(0,0,0,.05); border-radius: 8px; }
  .tw-toggle button { border: 0; padding: 4px 10px; border-radius: 6px; background: transparent; font-size: 11px; font-weight: 500; cursor: pointer; color: #52525b; }
  .tw-toggle button.active { background: #fff; color: #0a0a0c; box-shadow: 0 1px 2px rgba(0,0,0,.1); }

  /* Font pairing variants */
  body.fp-sf .landing-root,
  body.fp-sf .landing-root h1, body.fp-sf .landing-root h2, body.fp-sf .landing-root h3 {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
  }
  body.fp-serif .landing-root h1, body.fp-serif .landing-root h2, body.fp-serif .landing-root .title-serif {
    font-family: "Instrument Serif", Georgia, serif !important;
    letter-spacing: -0.025em !important;
  }
  body.fp-grotesk .landing-root,
  body.fp-grotesk .landing-root h1, body.fp-grotesk .landing-root h2, body.fp-grotesk .landing-root h3 {
    font-family: "Space Grotesk", system-ui, sans-serif !important;
  }

  /* ================================================================
     PILLARS — minimal folder animation (3-photo reveal)
     Inspired by framer.university/resources/minimal-folder-animation-in-framer
     Closed = photos peek out the top stacked. Open = photos spread in tight arc.
     Pure CSS transitions, GPU-composited transform/opacity only.
     ================================================================ */
  .pk-pillars-section { position: relative; overflow: hidden; isolation: isolate; }

  /* Chaos background — "before" state: disorganized iOS-photos-like grid.
     Full opacity so the photos actually render; subtle vignette instead of a dark veil. */
  .pk-pillars-chaos {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    grid-auto-rows: 100px;
    gap: 3px;
    filter: blur(10px) saturate(0.9);
    opacity: 1;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .pk-chaos-tile {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 4px;
    transform: rotate(var(--r, 0deg)) scale(1.12);
    transform-origin: center;
    display: block;
  }
  /* Subtle vignette only — lets the photos show through while fading edges */
  .pk-pillars-veil {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 95% 90% at center, transparent 0%, rgba(10,10,12,.25) 45%, rgba(10,10,12,.7) 100%),
      linear-gradient(180deg, rgba(10,10,12,.35) 0%, transparent 15%, transparent 85%, rgba(10,10,12,.5) 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* Row of folders — large safe zone above for photos to fly into (active state) */
  .pk-polaroid-row {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 36px;
    padding-top: 240px;       /* photos fly up ~220px from card bottom */
    padding-bottom: 32px;
    position: relative;
    z-index: 2;
  }

  /* Folder wrap — isolate stacking per-folder */
  .pk-folder {
    position: relative;
    width: 170px;
    flex: 0 0 auto;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    isolation: isolate;
  }
  .pk-folder:focus-visible .pk-folder-card {
    box-shadow:
      0 0 0 2px color-mix(in srgb, var(--pk-color) 70%, transparent),
      0 18px 36px -12px rgba(0,0,0,.6);
  }

  /* Liquid-glass card — icon + label on top, photos peeking from bottom */
  .pk-folder-card {
    position: relative;
    width: 170px;
    height: 200px;
    border-radius: 28px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.015) 50%, rgba(0,0,0,.1) 100%),
      linear-gradient(145deg, color-mix(in srgb, var(--pk-color) 16%, #18181c) 0%, #0e0e12 100%);
    border: 1px solid rgba(255,255,255,.1);
    box-shadow:
      0 18px 36px -12px rgba(0,0,0,.6),
      inset 0 1px 0 rgba(255,255,255,.08),
      inset 0 -1px 0 rgba(0,0,0,.2);
    transition:
      transform .45s cubic-bezier(0.34, 1.56, 0.64, 1),
      border-color .3s,
      box-shadow .3s;
    will-change: transform;
    z-index: 1;
  }
  .pk-folder-active .pk-folder-card {
    transform: translateY(4px);
    border-color: color-mix(in srgb, var(--pk-color) 60%, transparent);
    box-shadow:
      0 28px 48px -10px color-mix(in srgb, var(--pk-color) 40%, transparent),
      0 12px 24px -8px rgba(0,0,0,.5),
      inset 0 1px 0 rgba(255,255,255,.12);
  }

  /* Icon at top of card */
  .pk-folder-icon {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%) scale(1);
    font-size: 56px;
    line-height: 1;
    z-index: 3;
    transition: transform .45s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-shadow: 0 6px 18px rgba(0,0,0,.4);
    pointer-events: none;
  }
  .pk-folder-active .pk-folder-icon {
    transform: translateX(-50%) translateY(-4px) scale(1.06);
  }

  /* Geist Mono label "AUTO · 89" in card */
  .pk-folder-label {
    position: absolute;
    top: 100px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Geist Mono', ui-monospace, SF Mono, monospace;
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: color-mix(in srgb, var(--pk-color) 80%, white);
    text-transform: uppercase;
    z-index: 2;
    pointer-events: none;
  }

  /* 3 photos peeking from bottom of card. Closed = slightly dimmed. Active = fly up above. */
  .pk-folder-photo {
    position: absolute;
    width: 60px;
    height: 78px;
    left: 50%;
    bottom: -20px;
    margin-left: -30px;
    border: 2.5px solid #fff;
    border-radius: 5px;
    object-fit: cover;
    box-shadow: 0 -4px 10px -2px rgba(0,0,0,.45);
    transition:
      transform .65s cubic-bezier(0.34, 1.56, 0.64, 1),
      filter .4s;
    z-index: 2;
    pointer-events: none;
    filter: brightness(0.9) saturate(0.92);
    will-change: transform;
  }
  .pk-folder-active .pk-folder-photo { filter: none; }

  /* CLOSED — 3 photos stacked, peeking out the bottom */
  .pk-folder-photo[data-i="0"] { transform: translate(-14px, 0) rotate(-10deg); z-index: 2; }
  .pk-folder-photo[data-i="1"] { transform: translate(0, -6px) rotate(0); z-index: 4; }
  .pk-folder-photo[data-i="2"] { transform: translate(14px, 0) rotate(10deg); z-index: 3; }

  /* ACTIVE — photos fly UP above the card */
  .pk-folder-active .pk-folder-photo[data-i="0"] {
    transform: translate(-72px, -191px) rotate(-14deg) scale(1);
    transition-delay: 0s;
    box-shadow: 0 14px 28px -6px rgba(0,0,0,.65), 0 4px 8px rgba(0,0,0,.3);
    z-index: 100;
  }
  .pk-folder-active .pk-folder-photo[data-i="1"] {
    transform: translate(0, -221px) rotate(0) scale(1.05);
    transition-delay: 0.05s;
    box-shadow: 0 18px 34px -6px rgba(0,0,0,.7), 0 5px 10px rgba(0,0,0,.35);
    z-index: 102;
  }
  .pk-folder-active .pk-folder-photo[data-i="2"] {
    transform: translate(72px, -191px) rotate(14deg) scale(1);
    transition-delay: 0.1s;
    box-shadow: 0 14px 28px -6px rgba(0,0,0,.65), 0 4px 8px rgba(0,0,0,.3);
    z-index: 101;
  }

  /* Progress dots — auto-cycle indicator */
  .pk-polaroid-progress {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 48px;
  }
  .pk-polaroid-dot {
    width: 24px;
    height: 3px;
    border-radius: 3px;
    background: rgba(255,255,255,.12);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background .3s, width .3s;
  }
  .pk-polaroid-dot:hover { background: rgba(255,255,255,.25); }
  .pk-polaroid-dot.is-active {
    width: 48px;
    background: rgba(255,255,255,.15);
  }
  .pk-polaroid-dot.is-active::after {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 100%;
    background: var(--pk-color);
    transform-origin: left center;
    animation: pkDotFill 3s linear forwards;
  }
  .pk-polaroid-dot.is-active.is-locked::after {
    animation: none;
    width: 100%;
  }
  @keyframes pkDotFill {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }

  /* Reduced motion respect */
  @media (prefers-reduced-motion: reduce) {
    .pk-folder-photo { transition-duration: 0.2s; }
    .pk-polaroid-dot.is-active::after { animation: none; width: 100%; }
  }

  /* ================================================================
     TEMPLATES — "Fill from my gallery" CTA overlay + shimmer
     ================================================================ */
  .pk-fill-cta {
    transition: transform .2s cubic-bezier(.34,1.56,.64,1),
                box-shadow .25s,
                opacity .35s;
  }
  .pk-fill-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 44px -8px rgba(0,122,255,.55) !important;
  }
  .pk-fill-cta:active { transform: translateY(0) scale(0.985); }
  .pk-fill-cta-shimmer {
    position: absolute;
    top: 0; left: -40%;
    width: 30%;
    height: 100%;
    background: linear-gradient(100deg,
      transparent 0%,
      rgba(255,255,255,.28) 50%,
      transparent 100%);
    animation: pkFillShimmer 2.6s ease-in-out infinite;
    pointer-events: none;
    transform: skewX(-18deg);
  }
  @keyframes pkFillShimmer {
    0%   { left: -40%; }
    60%  { left: 130%; }
    100% { left: 130%; }
  }
  @keyframes pkFillPulse {
    0%, 100% { box-shadow: 0 14px 36px -6px rgba(0,122,255,.55), 0 0 0 8px rgba(0,122,255,.08); }
    50%      { box-shadow: 0 18px 48px -4px rgba(0,122,255,.7),  0 0 0 14px rgba(0,122,255,.0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .pk-fill-cta-shimmer { animation: none; display: none; }
    .pk-fill-cta { animation: none !important; }
  }

  /* ================================================================
     Mobile responsive — targets JSX className hooks with !important
     so inline React styles yield. Desktop untouched.
     ================================================================ */
  @media (max-width: 768px) {
    /* Nav: shrink padding, hide link anchors, keep lang + CTA tight */
    .pk-nav { padding: 12px 16px !important; }
    .pk-nav-links { display: none !important; }
    .pk-nav-actions { gap: 8px !important; }
    .pk-nav-cta { padding: 7px 14px !important; font-size: 12px !important; }
    .pk-nav-lang button { padding: 4px 8px !important; font-size: 10px !important; }

    /* Section horizontal padding pull-in */
    .pk-section {
      padding-left: 20px !important;
      padding-right: 20px !important;
    }

    /* Hero */
    .pk-hero { padding: 64px 20px 40px !important; }
    .pk-hero-eyebrow { margin-bottom: 18px !important; }
    .pk-hero-cta-wrap { margin-top: 24px !important; }
    .pk-hero-split {
      grid-template-columns: 1fr !important;
      gap: 14px !important;
      max-width: 100% !important;
    }
    .pk-hero-arrow {
      transform: rotate(90deg) !important;
      margin: 2px auto !important;
      width: 36px !important;
      height: 36px !important;
      font-size: 16px !important;
    }

    /* Problem: 4 → 2 cols */
    .pk-grid-problem {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 10px !important;
    }
    .pk-grid-problem > div { padding: 20px 14px !important; }
    .pk-grid-problem > div > div:first-child { font-size: 34px !important; }

    /* How: reveal stacks, 3 steps stack */
    .pk-grid-how-reveal {
      grid-template-columns: 1fr !important;
      gap: 24px !important;
    }
    /* Outer card that wraps reveal — tighten padding on mobile */
    div:has(> .pk-grid-how-reveal) { padding: 24px !important; margin-bottom: 48px !important; }
    .pk-grid-how-steps {
      grid-template-columns: 1fr !important;
      gap: 12px !important;
    }
    .pk-grid-how-steps > div { padding: 22px 20px !important; }

    /* Pillars: 2-col flex-wrap grid (no scroll). Mobile = 4 folders (2×2). */
    .pk-pillars-section { padding-top: 28px !important; padding-bottom: 28px !important; }
    .pk-pillars-head { margin-bottom: 18px !important; }
    .pk-pillars-head h2 { font-size: clamp(22px, 6.5vw, 28px) !important; }
    .pk-polaroid-row {
      justify-content: center !important;
      flex-wrap: wrap !important;
      overflow: visible !important;
      gap: 10px 12px !important;
      padding-top: 180px !important;
      padding-bottom: 16px !important;
    }
    .pk-folder { width: 150px !important; }
    .pk-folder-card { width: 150px !important; height: 176px !important; border-radius: 22px !important; }
    .pk-folder-icon { font-size: 44px !important; top: 22px !important; }
    .pk-folder-label { top: 82px !important; font-size: 9px !important; }
    .pk-folder-photo {
      width: 52px !important;
      height: 66px !important;
      margin-left: -26px !important;
      border-width: 2px !important;
    }
    /* Closed positions — tighter for smaller card */
    .pk-folder-photo[data-i="0"] { transform: translate(-12px, 0) rotate(-10deg) !important; }
    .pk-folder-photo[data-i="1"] { transform: translate(0, -5px) rotate(0) !important; }
    .pk-folder-photo[data-i="2"] { transform: translate(12px, 0) rotate(10deg) !important; }
    /* Open positions — photos fly up above card, proportional to smaller layout */
    .pk-folder.pk-folder-active .pk-folder-photo[data-i="0"] { transform: translate(-58px, -160px) rotate(-14deg) scale(1) !important; }
    .pk-folder.pk-folder-active .pk-folder-photo[data-i="1"] { transform: translate(0, -182px) rotate(0) scale(1.05) !important; }
    .pk-folder.pk-folder-active .pk-folder-photo[data-i="2"] { transform: translate(58px, -160px) rotate(14deg) scale(1) !important; }

    /* Chaos background mobile: smaller tiles, blur tuned for perf */
    .pk-pillars-chaos {
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)) !important;
      grid-auto-rows: 70px !important;
      filter: blur(8px) saturate(0.85) !important;
      opacity: 1 !important;
    }

    .pk-polaroid-progress { display: none !important; }

    /* Templates: stack (text → visual) */
    .pk-grid-templates {
      grid-template-columns: 1fr !important;
      gap: 32px !important;
    }
    .pk-grid-templates > div:last-child { padding: 20px !important; }
    .pk-fill-cta {
      font-size: 13px !important;
      padding: 14px 18px !important;
    }
    .pk-fill-cta > span:last-child > span:last-child { font-size: 16px !important; }

    /* Sync section: stack 3-col (iPhone · arrow · Mac) vertically + scale mockups down */
    .pk-sync-stage { padding: 32px 20px 40px !important; }
    .pk-grid-sync {
      grid-template-columns: 1fr !important;
      gap: 28px !important;
      justify-items: center !important;
    }
    .pk-grid-sync > div { max-width: 100% !important; }
    .pk-grid-sync-bullets {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 12px !important;
    }
    .pk-grid-sync-bullets > div { padding: 18px 14px !important; }

    /* Platforms: inner mock shrinks to fit */
    .pk-platform-shell > div { max-width: 340px !important; }

    /* Persona card: stack + center + tighten */
    .pk-grid-persona {
      grid-template-columns: 1fr !important;
      gap: 18px !important;
      padding: 28px 22px !important;
      text-align: center !important;
    }
    .pk-grid-persona > img { margin: 0 auto !important; width: 84px !important; height: 84px !important; }
    .pk-persona-quote {
      text-align: left !important;
      font-size: 15px !important;
    }

    /* Download: soften vertical padding */
    .pk-download { padding: 80px 20px !important; }

    /* Waitlist: form stays horizontal but button full-width below on tight */
    .pk-waitlist-form {
      flex-direction: column !important;
      gap: 10px !important;
    }
    .pk-waitlist-form > input,
    .pk-waitlist-form > button {
      width: 100% !important;
    }

    /* FAQ: slightly softer padding */
    .pk-faq { padding: 72px 20px !important; }
    .pk-faq button { font-size: 15px !important; padding: 18px 0 !important; }

    /* Footer: stack, center */
    .pk-footer {
      flex-direction: column !important;
      text-align: center !important;
      gap: 14px !important;
      padding: 28px 20px !important;
    }

    /* Typography softening */
    .pk-section h2 { font-size: clamp(26px, 8vw, 34px) !important; }
    .pk-hero h1 { font-size: clamp(36px, 10vw, 52px) !important; }

    /* Tweaks panel: out of the way on mobile */
    .tweaks-panel { display: none !important; }
  }

  /* Tablet fine-tune: 2-col problem, 3-col pillars tabs */
  @media (min-width: 769px) and (max-width: 1024px) {
    .pk-grid-problem { grid-template-columns: repeat(2, 1fr) !important; }
    .pk-grid-how-steps { grid-template-columns: repeat(3, 1fr) !important; }
    .pk-section { padding-left: 32px !important; padding-right: 32px !important; }
  }
</style>
</head>
<body class="fp-sf">

<!-- Tweaks Panel (populated via JS) -->
<div class="tweaks-panel" id="tweaksPanel">
  <h4>Tweaks</h4>
  <div class="tw-row">
    <label>Langue</label>
    <div class="tw-toggle" id="twLang"><button data-v="fr" class="active">FR</button><button data-v="en">EN</button></div>
  </div>
  <div class="tw-row">
    <label>Hero layout</label>
    <div class="tw-toggle" id="twHero"><button data-v="split" class="active">Split</button><button data-v="stack">Stack</button></div>
  </div>
  <div class="tw-row">
    <label>Font pairing</label>
    <div class="tw-toggle" id="twFont"><button data-v="sf" class="active">SF</button><button data-v="serif">Serif</button><button data-v="grotesk">Grotesk</button></div>
  </div>
  <div class="tw-row">
    <label>Densité</label>
    <div class="tw-toggle" id="twDensity"><button data-v="airy" class="active">Airy</button><button data-v="compact">Compact</button></div>
  </div>
  <div class="tw-row">
    <label>Version</label>
    <div class="tw-toggle" id="twVersion"><button data-v="safe" class="active">Safe</button><button data-v="bold">Bold</button></div>
  </div>
</div>

<div id="root"></div>

<script>
  // default tweak state
  window.__TWEAKS = /*EDITMODE-BEGIN*/{
    "lang": "en",
    "heroLayout": "split",
    "fontPairing": "serif",
    "density": "airy",
    "version": "safe"
  }/*EDITMODE-END*/;

  // edit-mode protocol
  window.addEventListener("message", (e) => {
    const d = e.data || {};
    if (d.type === "__activate_edit_mode") document.getElementById("tweaksPanel").classList.add("open");
    if (d.type === "__deactivate_edit_mode") document.getElementById("tweaksPanel").classList.remove("open");
  });
  setTimeout(() => {
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch(e){}
  }, 50);

  window.setTweak = function setTweak(k, v) {
    window.__TWEAKS[k] = v;
    try { localStorage.setItem("postkit.lang.user", k === "lang" ? v : (localStorage.getItem("postkit.lang.user") || "")); } catch(e) {}
    try { window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*"); } catch(e){}
    document.querySelectorAll('.tw-toggle').forEach(t => {
      const key = t.id.replace("tw","").toLowerCase();
      // ignore, our renderer re-reads from __TWEAKS
    });
    if (k === "fontPairing") {
      document.body.classList.remove("fp-sf", "fp-serif", "fp-grotesk");
      document.body.classList.add("fp-" + v);
    }
    if (window.__rerender) window.__rerender();
    // sync Tweaks panel toggles if present
    document.querySelectorAll('.tw-toggle').forEach(t => {
      const tkey = ({twLang:"lang",twHero:"heroLayout",twFont:"fontPairing",twDensity:"density",twVersion:"version"})[t.id];
      if (tkey === k) {
        t.querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.v === v));
      }
    });
  }
  // apply initial font
  document.body.classList.remove("fp-sf","fp-serif","fp-grotesk");
  document.body.classList.add("fp-" + window.__TWEAKS.fontPairing);

  // Geo-based language detection (once per visitor).
  // Priority: user explicit choice (localStorage) > IP country > browser navigator.language > default "en".
  (function autoDetectLang() {
    try {
      const forced = new URLSearchParams(location.search).get("lang");
      if (forced === "fr" || forced === "en") {
        window.__TWEAKS.lang = forced;
        return;
      }
      const userChoice = localStorage.getItem("postkit.lang.user");
      if (userChoice === "fr" || userChoice === "en") {
        window.__TWEAKS.lang = userChoice;
        return;
      }
      // Fast optimistic guess from browser before API resolves
      const nav = (navigator.language || "").toLowerCase();
      if (nav.startsWith("fr")) window.__TWEAKS.lang = "fr";
      else window.__TWEAKS.lang = "en";

      // Confirm via Vercel edge header (only in prod; dev fails silently)
      fetch("/api/geo").then(r => r.ok ? r.json() : null).then(d => {
        if (!d || !d.lang) return;
        if (localStorage.getItem("postkit.lang.user")) return; // user already picked
        if (d.lang !== window.__TWEAKS.lang) {
          window.__TWEAKS.lang = d.lang;
          if (window.__rerender) window.__rerender();
        }
      }).catch(() => {});
    } catch(e) {}
  })();

  // wire up toggles
  document.addEventListener("DOMContentLoaded", () => {
    const pairs = [["twLang","lang"],["twHero","heroLayout"],["twFont","fontPairing"],["twDensity","density"],["twVersion","version"]];
    pairs.forEach(([id, key]) => {
      const el = document.getElementById(id);
      if (!el) return;
      // set initial active
      const cur = window.__TWEAKS[key];
      el.querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.v === cur));
      el.addEventListener("click", (e) => {
        const btn = e.target.closest("button"); if (!btn) return;
        el.querySelectorAll("button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        setTweak(key, btn.dataset.v);
      });
    });
  });
</script>
