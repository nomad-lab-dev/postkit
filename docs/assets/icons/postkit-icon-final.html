<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1024px;
  height: 1024px;
  background: #06040f;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ─── iOS ICON FRAME ─── */
.icon-frame {
  width: 1024px;
  height: 1024px;
  border-radius: 230px;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(ellipse 75% 65% at 50% 44%, #211055 0%, #130928 55%, #0a0520 100%);
}

/* Subtle star-dust overlay */
.icon-frame::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.22) 0%, transparent 100%),
    radial-gradient(1px 1px at 82% 14%, rgba(255,255,255,0.16) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 68% 78%, rgba(255,255,255,0.12) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 82%, rgba(255,255,255,0.10) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 62%, rgba(255,255,255,0.14) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 10%, rgba(255,255,255,0.11) 0%, transparent 100%),
    radial-gradient(1px 1px at 8%  60%, rgba(255,255,255,0.08) 0%, transparent 100%),
    radial-gradient(1px 1px at 44% 88%, rgba(255,255,255,0.09) 0%, transparent 100%),
    radial-gradient(1px 1px at 96% 30%, rgba(255,255,255,0.10) 0%, transparent 100%),
    radial-gradient(1px 1px at 22% 45%, rgba(255,255,255,0.07) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* Wide ambient gold bloom behind center polaroid */
.glow-bloom {
  position: absolute;
  width: 460px;
  height: 400px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -56%);
  background: radial-gradient(ellipse, rgba(255,178,42,0.18) 0%, rgba(220,120,20,0.06) 45%, transparent 70%);
  z-index: 1;
  pointer-events: none;
}

/* ─── POLAROID STACK ─── */
.stack {
  position: relative;
  width: 720px;
  height: 580px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  margin-top: -155px;
}

/* ─── POLAROID SHARED ─── */
.polaroid {
  position: absolute;
  border-radius: 5px;
}

.photo-area {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  line-height: 1;
}

.tab { width: 100%; }

/* ─── LEFT  📸 ─── */
.p-left {
  width: 284px;
  background: #eae5de;
  padding: 15px 15px 0;
  transform: rotate(-20deg) translateX(-210px) translateY(8px);
  z-index: 2;
  box-shadow:
    -3px 10px 35px rgba(0,0,0,0.75),
    0   3px 10px rgba(0,0,0,0.45);
}
.p-left .photo-area {
  width: 254px;
  height: 254px;
  font-size: 128px;
  background: linear-gradient(150deg, #1c3c60 0%, #0d2040 100%);
}
.p-left .tab { height: 58px; }

/* ─── RIGHT  🚀 ─── */
.p-right {
  width: 284px;
  background: #eae5de;
  padding: 15px 15px 0;
  transform: rotate(20deg) translateX(210px) translateY(8px);
  z-index: 2;
  box-shadow:
    3px 10px 35px rgba(0,0,0,0.75),
    0   3px 10px rgba(0,0,0,0.45);
}
.p-right .photo-area {
  width: 254px;
  height: 254px;
  font-size: 128px;
  background: linear-gradient(150deg, #2c1a52 0%, #170c38 100%);
}
.p-right .tab { height: 58px; }

/* ─── CENTER  🌍  (hero) ─── */
.p-center {
  width: 314px;
  background: #ffffff;
  padding: 17px 17px 0;
  transform: translateY(-18px);
  z-index: 4;
  box-shadow:
    /* golden halo — 4 layers */
    0 0   2px  1px rgba(255,210,80,0.30),
    0 0  28px  8px rgba(255,185,45,0.42),
    0 0  65px 22px rgba(255,155,25,0.24),
    0 0 110px 48px rgba(240,120,15,0.13),
    /* depth */
    0 35px 95px rgba(0,0,0,0.92),
    0  8px 28px rgba(0,0,0,0.65);
}
.p-center .photo-area {
  width: 280px;
  height: 280px;
  font-size: 140px;
  background: linear-gradient(150deg, #201850 0%, #2e1c6e 40%, #1a0e44 100%);
}
.p-center .tab { height: 66px; }

/* Tiny golden pin-light at the very top edge of center polaroid */
.p-center::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(255,215,80,0.7), transparent);
  border-radius: 2px;
}
</style>
</head>
<body>
  <div class="icon-frame">
    <div class="glow-bloom"></div>
    <div class="stack">

      <div class="polaroid p-left">
        <div class="photo-area">📸</div>
        <div class="tab"></div>
      </div>

      <div class="polaroid p-right">
        <div class="photo-area">🚀</div>
        <div class="tab"></div>
      </div>

      <div class="polaroid p-center">
        <div class="photo-area">🌍</div>
        <div class="tab"></div>
      </div>

    </div>
  </div>
</body>
</html>
